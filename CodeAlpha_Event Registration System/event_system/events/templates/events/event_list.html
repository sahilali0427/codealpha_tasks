{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Events</title>
    <link rel="stylesheet" href="{% static 'events/style.css' %}">
</head>
<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/myregistrations/">My Registrations</a>
</div>

<div class="container">

<h1>Available Events</h1>

<form method="GET" class="search-box">

    <input type="text"
           name="search"
           placeholder="Search Event">

    <button type="submit">
        Search
    </button>

</form>

{% for event in events %}

<div class="card">

<h3>{{ event.name }}</h3>

<p>{{ event.description }}</p>

<p><b>Venue:</b> {{ event.venue }}</p>

<p><b>Date:</b> {{ event.date }}</p>

<a class="btn"
   href="/register-event/{{ event.id }}/">
    Register
</a>

</div>

{% empty %}

<p>No Events Found</p>

{% endfor %}

</div>

</body>
</html>
