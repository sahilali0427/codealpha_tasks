{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'events/style.css' %}">
</head>
<body>

<div class="form-box">

<h1>Login</h1>

<form method="POST">

    {% csrf_token %}

    <input type="text" name="username" placeholder="Username">

    <input type="password" name="password" placeholder="Password">

    <button type="submit">
        Login
    </button>

</form>

</div>

</body>
</html>
